<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#212529">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="김비서">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-152.png">
    <title>김비서</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root{--primary:#212529;--danger:#e03131;--bg-soft:#f8f9fa;--border:#dee2e6;--radius:12px;--font:'Pretendard',-apple-system,sans-serif;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);}
        *{box-sizing:border-box;margin:0;padding:0;font-family:var(--font);-webkit-tap-highlight-color:transparent;}
        body{background:#fff;color:#333;line-height:1.6;padding-top:calc(var(--safe-top) + 16px);padding-bottom:calc(var(--safe-bottom) + 16px);padding-left:16px;padding-right:16px;}
        .app{max-width:600px;margin:0 auto;}
        #loading-screen{display:flex;align-items:center;justify-content:center;min-height:80vh;flex-direction:column;gap:14px;}
        .spinner{width:36px;height:36px;border:3px solid #eee;border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        #login-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:20px;}
        .login-icon{font-size:56px;margin-bottom:16px;}
        .login-title{font-size:24px;font-weight:bold;margin-bottom:8px;}
        .login-sub{font-size:14px;color:#888;margin-bottom:32px;line-height:1.8;}
        .btn-google{display:flex;align-items:center;gap:12px;background:white;border:1px solid #ddd;padding:14px 24px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,0.08);margin-bottom:12px;}
        .btn-google img{width:22px;height:22px;}
        .ios-login-box{background:#f0f7ff;border:1px solid #b6d4f7;border-radius:14px;padding:20px;max-width:320px;margin-top:8px;}
        .ios-login-box p{font-size:13px;color:#1a5fa8;margin-bottom:14px;line-height:1.7;}
        .ios-steps{text-align:left;margin-bottom:16px;}
        .ios-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;font-size:13px;color:#333;}
        .ios-num{width:22px;height:22px;background:#1a5fa8;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0;margin-top:1px;}
        .btn-open-safari{background:#1a5fa8;color:white;border:none;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:bold;cursor:pointer;width:100%;}
        #main-app{display:none;}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
        .header-left{display:flex;align-items:center;gap:8px;}
        .user-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1px solid #eee;}
        .user-name{font-size:11px;color:#888;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .sync-badge{font-size:11px;padding:2px 8px;border-radius:10px;background:#d3f9d8;color:#2f9e44;}
        .btn-logout{background:none;border:1px solid #ddd;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;color:#666;}
        .tabs{display:flex;gap:5px;background:var(--bg-soft);padding:5px;border-radius:10px;}
        .tab{padding:8px 18px;border:none;border-radius:7px;cursor:pointer;background:transparent;font-size:13px;transition:0.2s;}
        .tab.active{background:white;font-weight:bold;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
        .stat-card{background:var(--bg-soft);padding:12px;border-radius:var(--radius);text-align:center;}
        .stat-num{font-size:20px;font-weight:bold;color:var(--primary);}
        .stat-label{font-size:11px;color:#666;margin-top:2px;}
        .input-card{background:var(--bg-soft);padding:18px;border-radius:var(--radius);margin-bottom:20px;border:1px solid var(--border);}
        .input-group{display:flex;gap:8px;margin-bottom:8px;}
        input,select,textarea{padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;width:100%;background:white;color:#333;}
        .flex-1{flex:1;}
        .btn-add{background:var(--primary);color:white;border:none;padding:14px;border-radius:8px;cursor:pointer;width:100%;font-weight:bold;transition:0.2s;font-size:15px;}
        .btn-add:active{background:#000;transform:scale(0.98);}
        .item{display:flex;gap:12px;padding:15px;border-bottom:1px solid #eee;align-items:flex-start;}
        .item.urgent{background:#fff5f5;border-left:4px solid var(--danger);}
        .item-check{flex-shrink:0;width:20px;margin-top:4px;}
        .item-check input{width:22px;height:22px;cursor:pointer;accent-color:var(--primary);}
        .item-content{flex:1;min-width:0;}
        .item-text{font-size:14px;font-weight:600;margin-bottom:4px;word-break:break-all;}
        .item-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
        .badge{font-size:11px;padding:2px 7px;border-radius:10px;background:#eee;color:#666;}
        .gcal-link{font-size:11px;color:#185fa5;text-decoration:none;background:#e6f1fb;padding:2px 8px;border-radius:10px;}
        .done .item-text{text-decoration:line-through;color:#adb5bd;}
        .item-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
        .btn-del{color:#ccc;border:none;background:none;cursor:pointer;font-size:20px;width:28px;text-align:right;line-height:1;padding:4px 0;}
        .btn-edit{color:#aaa;border:none;background:none;cursor:pointer;font-size:15px;width:28px;text-align:right;line-height:1;padding:4px 0;}
        .edit-area{display:none;margin-top:10px;padding:12px;background:#fff;border:1px solid var(--border);border-radius:10px;}
        .edit-area.open{display:block;}
        .edit-area .input-group{margin-bottom:6px;}
        .edit-row{display:flex;gap:6px;margin-top:6px;}
        .btn-save{background:var(--primary);color:white;border:none;padding:10px 16px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:bold;flex:1;}
        .btn-cancel{background:#eee;color:#555;border:none;padding:10px 16px;border-radius:7px;cursor:pointer;font-size:13px;flex:1;}
        #alert-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:10000;align-items:center;justify-content:center;}
        .modal{background:white;padding:35px;border-radius:24px;text-align:center;width:85%;max-width:380px;animation:bounce 0.5s infinite alternate;}
        @keyframes bounce{from{transform:scale(1);}to{transform:scale(1.03);}}
        .modal h2{color:var(--danger);margin-bottom:12px;font-size:22px;}
        .btn-confirm{background:var(--danger);color:white;border:none;padding:12px 40px;border-radius:12px;cursor:pointer;font-weight:bold;font-size:15px;}
        .section{display:none;}
        .section.active{display:block;}
        .empty{text-align:center;padding:40px;color:#bbb;}
    </style>
</head>
<body>
<div id="alert-overlay">
    <div class="modal">
        <h2>🚨 마감 알림 🚨</h2>
        <p id="alert-msg" style="font-weight:bold;margin-bottom:20px;"></p>
        <button class="btn-confirm" onclick="closeAlert()">확인했습니다</button>
    </div>
</div>

<div id="loading-screen">
    <div class="spinner"></div>
    <div style="font-size:13px;color:#aaa;">로그인 확인 중...</div>
</div>

<div id="login-screen">
    <div class="login-icon">📋</div>
    <div class="login-title">나의 완벽한 비서</div>
    <div class="login-sub">구글 계정으로 로그인하면<br>모든 기기에서 데이터가 동기화됩니다</div>

    <!-- 일반 브라우저용 버튼 -->
    <button class="btn-google" id="normal-login-btn" onclick="loginWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Google로 로그인
    </button>

    <!-- iOS 홈화면 앱 전용 안내 -->
    <div class="ios-login-box" id="ios-standalone-guide" style="display:none;">
        <p>아이폰 홈화면 앱에서는<br>아래 순서로 로그인해주세요</p>
        <div class="ios-steps">
            <div class="ios-step"><div class="ios-num">1</div><div>아래 버튼을 눌러 <b>Safari</b>로 열기</div></div>
            <div class="ios-step"><div class="ios-num">2</div><div>Safari에서 <b>Google로 로그인</b> 탭</div></div>
            <div class="ios-step"><div class="ios-num">3</div><div>로그인 완료 후 <b>홈 화면</b>에서 앱 다시 열기</div></div>
        </div>
        <button class="btn-open-safari" onclick="openInSafari()">Safari에서 열기</button>
    </div>
</div>

<div id="main-app">
<div class="app">
    <div class="header">
        <div class="header-left">
            <img id="user-avatar" class="user-avatar" src="" alt="">
            <div>
                <div style="font-size:14px;font-weight:bold;">나의 완벽한 비서</div>
                <div class="user-name" id="user-name"></div>
            </div>
            <span class="sync-badge">☁ 동기화됨</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('todo',this)">할 일</button>
                <button class="tab" onclick="switchTab('memo',this)">메모</button>
            </div>
            <button class="btn-logout" onclick="logout()">로그아웃</button>
        </div>
    </div>
    <div id="sec-todo" class="section active">
        <div class="stats">
            <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-label">전체</div></div>
            <div class="stat-card"><div class="stat-num" id="s-done">0</div><div class="stat-label">완료</div></div>
            <div class="stat-card"><div class="stat-num" id="s-left">0</div><div class="stat-label">진행중</div></div>
        </div>
        <div class="input-card">
            <div class="input-group">
                <input id="t-input" class="flex-1" placeholder="할 일을 입력하세요...">
                <select id="t-priority" style="width:80px;"><option>보통</option><option>높음</option><option>낮음</option></select>
            </div>
            <div class="input-group"><input id="t-date" type="datetime-local"></div>
            <button class="btn-add" onclick="addTodo()">추가하기</button>
        </div>
        <div id="todo-list"></div>
    </div>
    <div id="sec-memo" class="section">
        <div class="input-card">
            <input id="m-title" style="margin-bottom:8px;" placeholder="제목">
            <textarea id="m-body" rows="5" placeholder="메모 내용을 입력하세요..."></textarea>
            <button class="btn-add" style="margin-top:8px;" onclick="addMemo()">저장</button>
        </div>
        <div id="memo-list"></div>
    </div>
</div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyDIqijLagXNJborvELQ60Uop6mzUK2jB_Y",authDomain:"tirerss7.firebaseapp.com",projectId:"tirerss7",storageBucket:"tirerss7.firebasestorage.app",messagingSenderId:"1093160433471",appId:"1:1093160433471:web:d77341ee31f77442ee058a"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone=window.navigator.standalone===true;

let currentUser=null,todos=[],memos=[],unsubTodos=null,unsubMemos=null,blinker=null,sirenInterval=null;

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(console.error);
if(Notification.permission!=="granted"&&Notification.permission!=="denied") Notification.requestPermission();

// iOS 홈화면 앱 모드 감지 → 안내 UI 표시
if(isIOS&&isStandalone){
    document.getElementById('normal-login-btn').style.display='none';
    document.getElementById('ios-standalone-guide').style.display='block';
}

function openInSafari(){
    // Safari로 현재 페이지 열기 (홈화면 앱에서 Safari로 전환)
    window.location.href='https://tigerss7.github.io/first_ss/';
}

// redirect 결과 처리 (Safari에서 로그인 후 돌아올 때)
auth.getRedirectResult().then(result=>{
    if(result&&result.user) console.log('redirect login success');
}).catch(err=>{ console.error('redirect error',err); });

auth.onAuthStateChanged(user=>{
    document.getElementById('loading-screen').style.display='none';
    if(user){
        currentUser=user;
        document.getElementById('user-avatar').src=user.photoURL||'';
        document.getElementById('user-name').textContent=user.displayName||user.email;
        document.getElementById('login-screen').style.display='none';
        document.getElementById('main-app').style.display='block';
        startListeners();
    } else {
        currentUser=null;
        stopListeners();
        document.getElementById('main-app').style.display='none';
        document.getElementById('login-screen').style.display='flex';
    }
});

function loginWithGoogle(){
    const provider=new firebase.auth.GoogleAuthProvider();
    if(isIOS){
        auth.signInWithRedirect(provider).catch(err=>alert('로그인 실패: '+err.message));
    } else {
        auth.signInWithPopup(provider).catch(err=>alert('로그인 실패: '+err.message));
    }
}

function logout(){if(!confirm('로그아웃 하시겠어요?'))return;auth.signOut();}

function startListeners(){
    const uid=currentUser.uid;
    unsubTodos=db.collection('users').doc(uid).collection('todos').orderBy('createdAt','desc').onSnapshot(snap=>{
        todos=snap.docs.map(d=>({firestoreId:d.id,...d.data()}));renderTodos();
    });
    unsubMemos=db.collection('users').doc(uid).collection('memos').orderBy('createdAt','desc').onSnapshot(snap=>{
        memos=snap.docs.map(d=>({firestoreId:d.id,...d.data()}));renderMemos();
    });
}
function stopListeners(){
    if(unsubTodos){unsubTodos();unsubTodos=null;}
    if(unsubMemos){unsubMemos();unsubMemos=null;}
    todos=[];memos=[];
}
function userCol(type){return db.collection('users').doc(currentUser.uid).collection(type);}

async function addTodo(){
    const input=document.getElementById('t-input'),date=document.getElementById('t-date');
    if(!input.value.trim())return;
    await userCol('todos').add({text:input.value.trim(),date:date.value,priority:document.getElementById('t-priority').value,done:false,notified:false,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    input.value='';date.value='';
}
async function toggleTodo(fid,current){await userCol('todos').doc(fid).update({done:!current});}
async function saveEdit(fid){
    const newText=document.getElementById('edit-text-'+fid).value.trim();
    if(!newText){alert('내용을 입력해주세요.');return;}
    await userCol('todos').doc(fid).update({text:newText,priority:document.getElementById('edit-priority-'+fid).value,date:document.getElementById('edit-date-'+fid).value,notified:false});
}
async function delTodo(fid){if(!confirm('삭제할까요?'))return;await userCol('todos').doc(fid).delete();}
async function addMemo(){
    const title=document.getElementById('m-title'),body=document.getElementById('m-body');
    if(!title.value&&!body.value)return;
    await userCol('memos').add({title:title.value,body:body.value,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    title.value='';body.value='';
}
async function delMemo(fid){if(!confirm('삭제할까요?'))return;await userCol('memos').doc(fid).delete();}

function openEdit(fid){
    document.querySelectorAll('.edit-area.open').forEach(el=>el.classList.remove('open'));
    const t=todos.find(x=>x.firestoreId===fid);if(!t)return;
    document.getElementById('edit-text-'+fid).value=t.text;
    document.getElementById('edit-priority-'+fid).value=t.priority;
    document.getElementById('edit-date-'+fid).value=t.date||'';
    document.getElementById('edit-'+fid).classList.add('open');
}
function cancelEdit(fid){document.getElementById('edit-'+fid)?.classList.remove('open');}
function switchTab(name,el){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    el.classList.add('active');document.getElementById('sec-'+name).classList.add('active');
}
function getGcalUrl(text,dateStr){
    if(!dateStr)return null;
    const d=new Date(dateStr),fmt=d.toISOString().replace(/[-:]/g,'').split('.')[0]+"Z";
    return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(text)}&dates=${fmt}/${fmt}`;
}
function renderTodos(){
    const container=document.getElementById('todo-list');
    document.getElementById('s-total').innerText=todos.length;
    document.getElementById('s-done').innerText=todos.filter(x=>x.done).length;
    document.getElementById('s-left').innerText=todos.filter(x=>!x.done).length;
    if(todos.length===0){container.innerHTML='<div class="empty">목록이 비어있습니다.</div>';return;}
    container.innerHTML=todos.map(t=>{
        const isOver=!t.done&&t.date&&new Date(t.date)<new Date();
        const gcal=getGcalUrl(t.text,t.date);const fid=t.firestoreId;
        return `<div class="item ${t.done?'done':''} ${isOver?'urgent':''}">
            <div class="item-check"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo('${fid}',${t.done})"></div>
            <div class="item-content">
                <div class="item-text">${t.text}</div>
                <div class="item-meta">
                    <span class="badge">${t.priority}</span>
                    <span style="font-size:11px;color:#999;">${t.date?t.date.replace('T',' '):'기한 없음'}</span>
                    ${gcal?`<a href="${gcal}" target="_blank" class="gcal-link">🗓 캘린더</a>`:''}
                </div>
                <div class="edit-area" id="edit-${fid}">
                    <div class="input-group"><input id="edit-text-${fid}" class="flex-1" placeholder="할 일 내용"><select id="edit-priority-${fid}" style="width:80px;"><option>보통</option><option>높음</option><option>낮음</option></select></div>
                    <div class="input-group"><input id="edit-date-${fid}" type="datetime-local"></div>
                    <div class="edit-row"><button class="btn-save" onclick="saveEdit('${fid}')">저장</button><button class="btn-cancel" onclick="cancelEdit('${fid}')">취소</button></div>
                </div>
            </div>
            <div class="item-actions"><button class="btn-edit" onclick="openEdit('${fid}')">✏️</button><button class="btn-del" onclick="delTodo('${fid}')">×</button></div>
        </div>`;
    }).join('');
}
function renderMemos(){
    const container=document.getElementById('memo-list');
    if(memos.length===0){container.innerHTML='<div class="empty">메모가 없습니다.</div>';return;}
    container.innerHTML=memos.map(m=>`<div class="item"><div class="item-content"><div style="font-weight:bold;">${m.title||'제목 없음'}</div><div style="font-size:13px;color:#666;white-space:pre-wrap;">${m.body}</div></div><button class="btn-del" onclick="delMemo('${m.firestoreId}')">×</button></div>`).join('');
}
const canvas=document.createElement('canvas');canvas.width=32;canvas.height=32;const ctx=canvas.getContext('2d');
function setFavicon(color){
    ctx.clearRect(0,0,32,32);
    if(color){ctx.fillStyle=color;ctx.fillRect(0,0,32,32);ctx.fillStyle="white";ctx.font="bold 24px Arial";ctx.textAlign="center";ctx.fillText("!",16,26);}
    let link=document.querySelector("link[rel~='icon']");
    if(!link){link=document.createElement('link');link.rel='icon';document.head.appendChild(link);}
    link.href=canvas.toDataURL();
}
function triggerAlert(text){
    if(Notification.permission==="granted"){const n=new Notification("⏰ 마감 시간입니다!",{body:text});n.onclick=()=>{window.focus();n.close();};}
    window.focus();
    try{const a=new(window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.setValueAtTime(523.25,a.currentTime);g.gain.setValueAtTime(0.1,a.currentTime);o.start();o.stop(a.currentTime+0.5);}catch(e){}
    if(!blinker){let tg=false;blinker=setInterval(()=>{document.title=tg?`🚨 [마감] ${text}`:`❗ [확인] ${text}`;setFavicon(tg?'#ff0000':'#ffff00');tg=!tg;},400);}
    document.getElementById('alert-msg').innerText=text;
    const ov=document.getElementById('alert-overlay');ov.style.display='flex';
    if(!sirenInterval){let r=false;sirenInterval=setInterval(()=>{ov.style.backgroundColor=r?"rgba(0,0,0,0.9)":"rgba(224,49,49,0.7)";r=!r;},400);}
}
function closeAlert(){
    document.getElementById('alert-overlay').style.display='none';
    clearInterval(blinker);clearInterval(sirenInterval);blinker=null;sirenInterval=null;
    document.title="김비서";document.getElementById('alert-overlay').style.backgroundColor="rgba(0,0,0,0.85)";setFavicon(null);
}
setInterval(async()=>{
    if(!currentUser)return;
    const now=new Date();
    const nowStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+'T'+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    todos.forEach(async t=>{if(!t.done&&t.date===nowStr&&!t.notified){triggerAlert(t.text);await userCol('todos').doc(t.firestoreId).update({notified:true});}});
},10000);
</script>
</body>
