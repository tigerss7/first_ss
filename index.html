<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#212529">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="김비서">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-152.png">
    <title>김비서</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root{--primary:#212529;--danger:#e03131;--bg-soft:#f8f9fa;--border:#dee2e6;--radius:12px;--font:'Pretendard',-apple-system,sans-serif;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);}
        *{box-sizing:border-box;margin:0;padding:0;font-family:var(--font);-webkit-tap-highlight-color:transparent;}
        body{background:#f2f4f6;color:#333;line-height:1.6;padding-top:calc(var(--safe-top) + 16px);padding-bottom:calc(var(--safe-bottom) + 80px);padding-left:16px;padding-right:16px;}
        .app{max-width:600px;margin:0 auto;}

        /* 로딩 / 로그인 */
        #loading-screen{display:flex;align-items:center;justify-content:center;min-height:80vh;flex-direction:column;gap:14px;}
        .spinner{width:36px;height:36px;border:3px solid #eee;border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        #login-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:20px;background:#fff;border-radius:20px;}
        .btn-google{display:flex;align-items:center;gap:12px;background:white;border:1px solid #ddd;padding:14px 24px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
        .btn-google img{width:22px;height:22px;}
        .ios-login-box{background:#f0f7ff;border:1px solid #b6d4f7;border-radius:14px;padding:20px;max-width:320px;margin-top:12px;}
        .ios-login-box p{font-size:13px;color:#1a5fa8;margin-bottom:14px;line-height:1.7;}
        .ios-steps{text-align:left;margin-bottom:16px;}
        .ios-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;font-size:13px;color:#333;}
        .ios-num{width:22px;height:22px;background:#1a5fa8;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0;margin-top:1px;}
        .btn-open-safari{background:#1a5fa8;color:white;border:none;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:bold;cursor:pointer;width:100%;}

        #main-app{display:none;}

        /* 헤더 */
        .header{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
        .header-left{display:flex;align-items:center;gap:8px;}
        .user-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid #f0f0f0;}
        .user-name{font-size:11px;color:#888;}
        .sync-badge{font-size:11px;padding:2px 8px;border-radius:10px;background:#d3f9d8;color:#2f9e44;}
        .btn-logout{background:none;border:1px solid #ddd;padding:5px 10px;border-radius:8px;font-size:12px;cursor:pointer;color:#666;}

        /* 탭 바 */
        .tab-bar{display:flex;gap:8px;margin-bottom:14px;}
        .tab{flex:1;padding:12px 8px;border:none;border-radius:12px;cursor:pointer;background:#fff;font-size:14px;font-weight:600;color:#999;transition:0.2s;}
        .tab.active{background:var(--primary);color:#fff;}

        /* 긴급 대시보드 */
        #urgent-dashboard{margin-bottom:14px;}
        .dash-title{font-size:12px;font-weight:700;color:#999;letter-spacing:0.5px;margin-bottom:8px;padding-left:4px;}
        .urgent-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:8px;border-left:4px solid var(--danger);position:relative;overflow:hidden;}
        .urgent-card.overdue{background:#fff5f5;border-left-color:#c92a2a;}
        .urgent-card.today{background:#fff9f0;border-left-color:#f76707;}
        .urgent-card.soon{background:#f0fff4;border-left-color:#2f9e44;}
        .uc-label{font-size:10px;font-weight:700;letter-spacing:0.5px;margin-bottom:4px;}
        .overdue .uc-label{color:#c92a2a;}
        .today .uc-label{color:#f76707;}
        .soon .uc-label{color:#2f9e44;}
        .uc-text{font-size:14px;font-weight:700;color:#222;margin-bottom:4px;}
        .uc-countdown{font-size:12px;color:#888;display:flex;align-items:center;gap:6px;}
        .uc-done-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:1.5px solid #ddd;border-radius:50%;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;}

        /* 입력 카드 */
        .input-card{background:#fff;padding:18px;border-radius:16px;margin-bottom:14px;}
        .input-row{display:flex;gap:8px;margin-bottom:10px;}
        input,select,textarea{padding:11px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;outline:none;width:100%;background:#fff;color:#333;}
        input:focus,textarea:focus{border-color:#adb5bd;}
        .flex-1{flex:1;}
        .btn-add{background:var(--primary);color:white;border:none;padding:14px;border-radius:12px;cursor:pointer;width:100%;font-weight:bold;font-size:15px;transition:0.15s;}
        .btn-add:active{transform:scale(0.98);}

        /* 캘린더 버튼 */
        .gcal-auto-btn{display:flex;align-items:center;gap:6px;background:#e8f4fd;border:none;color:#1971c2;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:10px;width:100%;transition:0.15s;}
        .gcal-auto-btn:active{background:#d0e8f9;}
        .gcal-auto-btn.hidden{display:none;}

        /* 할 일 목록 */
        .todo-section{background:#fff;border-radius:16px;overflow:hidden;margin-bottom:14px;}
        .todo-section-header{padding:14px 16px 10px;font-size:12px;font-weight:700;color:#999;letter-spacing:0.5px;}
        .item{display:flex;gap:12px;padding:14px 16px;border-bottom:0.5px solid #f0f0f0;align-items:flex-start;}
        .item:last-child{border-bottom:none;}
        .item-check input{width:22px;height:22px;cursor:pointer;accent-color:var(--primary);flex-shrink:0;margin-top:2px;}
        .item-content{flex:1;min-width:0;}
        .item-text{font-size:14px;font-weight:600;margin-bottom:3px;word-break:break-all;color:#222;}
        .item-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
        .badge{font-size:11px;padding:2px 7px;border-radius:8px;background:#f0f0f0;color:#666;}
        .badge.high{background:#fff0f0;color:#c92a2a;}
        .badge.low{background:#f0fff4;color:#2f9e44;}
        .time-badge{font-size:11px;color:#999;}
        .done .item-text{text-decoration:line-through;color:#adb5bd;}
        .item-actions{display:flex;gap:4px;flex-shrink:0;}
        .btn-icon{color:#ccc;border:none;background:none;cursor:pointer;font-size:16px;padding:4px;line-height:1;}
        .btn-icon:hover{color:#888;}

        /* 인라인 편집 */
        .edit-area{display:none;margin-top:10px;padding:12px;background:#f8f9fa;border-radius:10px;}
        .edit-area.open{display:block;}
        .edit-row{display:flex;gap:6px;margin-top:8px;}
        .btn-save{background:var(--primary);color:white;border:none;padding:10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold;flex:1;}
        .btn-cancel{background:#eee;color:#555;border:none;padding:10px;border-radius:8px;cursor:pointer;font-size:13px;flex:1;}

        /* 메모 */
        .memo-card{background:#fff;border-radius:16px;overflow:hidden;margin-bottom:10px;}
        .memo-item{padding:14px 16px;border-bottom:0.5px solid #f0f0f0;}
        .memo-item:last-child{border-bottom:none;}

        /* 알림 모달 */
        #alert-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:10000;align-items:center;justify-content:center;}
        .modal{background:white;padding:35px;border-radius:24px;text-align:center;width:85%;max-width:380px;animation:bounce 0.5s infinite alternate;}
        @keyframes bounce{from{transform:scale(1);}to{transform:scale(1.03);}}
        .modal h2{color:var(--danger);margin-bottom:12px;font-size:22px;}
        .btn-confirm{background:var(--danger);color:white;border:none;padding:12px 40px;border-radius:12px;cursor:pointer;font-weight:bold;font-size:15px;}

        .section{display:none;}
        .section.active{display:block;}
        .empty{text-align:center;padding:40px;color:#bbb;background:#fff;border-radius:16px;}
    </style>
</head>
<body>
<div id="alert-overlay">
    <div class="modal">
        <h2>🚨 마감 알림 🚨</h2>
        <p id="alert-msg" style="font-weight:bold;margin-bottom:20px;"></p>
        <button class="btn-confirm" onclick="closeAlert()">확인했습니다</button>
    </div>
</div>

<div id="loading-screen">
    <div class="spinner"></div>
    <div style="font-size:13px;color:#aaa;">로그인 확인 중...</div>
</div>

<div id="login-screen">
    <div style="font-size:48px;margin-bottom:12px;">📋</div>
    <div style="font-size:22px;font-weight:bold;margin-bottom:6px;">나의 완벽한 비서</div>
    <div style="font-size:14px;color:#888;margin-bottom:28px;line-height:1.8;">구글 계정으로 로그인하면<br>모든 기기에서 동기화됩니다</div>
    <button class="btn-google" id="normal-login-btn" onclick="loginWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Google로 로그인
    </button>
    <div class="ios-login-box" id="ios-standalone-guide" style="display:none;">
        <p>아이폰 홈화면 앱에서는<br>아래 순서로 로그인해주세요</p>
        <div class="ios-steps">
            <div class="ios-step"><div class="ios-num">1</div><div>아래 버튼을 눌러 <b>Safari</b>로 열기</div></div>
            <div class="ios-step"><div class="ios-num">2</div><div>Safari에서 <b>Google로 로그인</b> 탭</div></div>
            <div class="ios-step"><div class="ios-num">3</div><div>로그인 후 <b>홈 화면</b>에서 앱 다시 열기</div></div>
        </div>
        <button class="btn-open-safari" onclick="openInSafari()">Safari에서 열기</button>
    </div>
</div>

<div id="main-app">
<div class="app">

    <div class="header">
        <div class="header-left">
            <img id="user-avatar" class="user-avatar" src="" alt="">
            <div>
                <div style="font-size:14px;font-weight:700;">김비서</div>
                <div class="user-name" id="user-name"></div>
            </div>
            <span class="sync-badge">☁ 동기화됨</span>
        </div>
        <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>

    <div class="tab-bar">
        <button class="tab active" onclick="switchTab('todo',this)">✅ 할 일</button>
        <button class="tab" onclick="switchTab('memo',this)">📝 메모</button>
    </div>

    <!-- 할 일 섹션 -->
    <div id="sec-todo" class="section active">

        <!-- 긴급 대시보드 -->
        <div id="urgent-dashboard"></div>

        <!-- 입력 -->
        <div class="input-card">
            <div class="input-row">
                <input id="t-input" class="flex-1" placeholder="할 일을 입력하세요...">
                <select id="t-priority" style="width:76px;">
                    <option>보통</option><option>높음</option><option>낮음</option>
                </select>
            </div>
            <div class="input-row">
                <input id="t-date" type="datetime-local" oninput="onDateChange()">
            </div>
            <button id="gcal-preview-btn" class="gcal-auto-btn hidden" onclick="openGcalPreview()">
                🗓 구글 캘린더에도 추가하기
            </button>
            <button class="btn-add" onclick="addTodo()">추가하기</button>
        </div>

        <!-- 통계 -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">
            <div style="background:#fff;padding:12px;border-radius:12px;text-align:center;">
                <div style="font-size:22px;font-weight:bold;color:var(--primary);" id="s-total">0</div>
                <div style="font-size:11px;color:#999;margin-top:2px;">전체</div>
            </div>
            <div style="background:#fff;padding:12px;border-radius:12px;text-align:center;">
                <div style="font-size:22px;font-weight:bold;color:#2f9e44;" id="s-done">0</div>
                <div style="font-size:11px;color:#999;margin-top:2px;">완료</div>
            </div>
            <div style="background:#fff;padding:12px;border-radius:12px;text-align:center;">
                <div style="font-size:22px;font-weight:bold;color:#f76707;" id="s-left">0</div>
                <div style="font-size:11px;color:#999;margin-top:2px;">진행중</div>
            </div>
        </div>

        <div id="todo-list"></div>
    </div>

    <!-- 메모 섹션 -->
    <div id="sec-memo" class="section">
        <div class="input-card">
            <input id="m-title" style="margin-bottom:8px;" placeholder="제목">
            <textarea id="m-body" rows="4" placeholder="메모 내용을 입력하세요..."></textarea>
            <button class="btn-add" style="margin-top:10px;" onclick="addMemo()">저장</button>
        </div>
        <div id="memo-list"></div>
    </div>

</div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyDIqijLagXNJborvELQ60Uop6mzUK2jB_Y",authDomain:"tirerss7.firebaseapp.com",projectId:"tirerss7",storageBucket:"tirerss7.firebasestorage.app",messagingSenderId:"1093160433471",appId:"1:1093160433471:web:d77341ee31f77442ee058a"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone=window.navigator.standalone===true;
let currentUser=null,todos=[],memos=[],unsubTodos=null,unsubMemos=null,blinker=null,sirenInterval=null;

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
if(Notification.permission!=='granted'&&Notification.permission!=='denied') Notification.requestPermission();

if(isIOS&&isStandalone){
    document.getElementById('normal-login-btn').style.display='none';
    document.getElementById('ios-standalone-guide').style.display='block';
}
function openInSafari(){ window.location.href='https://tigerss7.github.io/first_ss/'; }

auth.getRedirectResult().catch(()=>{});
auth.onAuthStateChanged(user=>{
    document.getElementById('loading-screen').style.display='none';
    if(user){
        currentUser=user;
        document.getElementById('user-avatar').src=user.photoURL||'';
        document.getElementById('user-name').textContent=user.displayName||user.email;
        document.getElementById('login-screen').style.display='none';
        document.getElementById('main-app').style.display='block';
        startListeners();
    } else {
        currentUser=null;
        stopListeners();
        document.getElementById('main-app').style.display='none';
        document.getElementById('login-screen').style.display='flex';
    }
});

function loginWithGoogle(){
    const provider=new firebase.auth.GoogleAuthProvider();
    if(isIOS){ auth.signInWithRedirect(provider); }
    else { auth.signInWithPopup(provider).catch(err=>alert('로그인 실패: '+err.message)); }
}
function logout(){ if(!confirm('로그아웃 하시겠어요?'))return; if('clearAppBadge' in navigator)navigator.clearAppBadge(); auth.signOut(); }

function startListeners(){
    const uid=currentUser.uid;
    unsubTodos=db.collection('users').doc(uid).collection('todos').orderBy('createdAt','desc').onSnapshot(snap=>{
        todos=snap.docs.map(d=>({fid:d.id,...d.data()}));
        renderTodos(); renderUrgentDashboard();
    });
    unsubMemos=db.collection('users').doc(uid).collection('memos').orderBy('createdAt','desc').onSnapshot(snap=>{
        memos=snap.docs.map(d=>({fid:d.id,...d.data()}));
        renderMemos();
    });
    setInterval(()=>{ renderUrgentDashboard(); renderTodos(); }, 60000);
}
function stopListeners(){
    if(unsubTodos){unsubTodos();unsubTodos=null;}
    if(unsubMemos){unsubMemos();unsubMemos=null;}
    todos=[];memos=[];
}
function userCol(t){ return db.collection('users').doc(currentUser.uid).collection(t); }

// ── 날짜 변경 시 캘린더 버튼 노출 ──
function onDateChange(){
    const v=document.getElementById('t-date').value;
    const btn=document.getElementById('gcal-preview-btn');
    btn.classList.toggle('hidden',!v);
}

// ── 구글 캘린더 바로 열기 ──
function openGcalPreview(){
    const text=document.getElementById('t-input').value||'할 일';
    const date=document.getElementById('t-date').value;
    if(!date) return;
    const url=getGcalUrl(text,date);
    if(url) window.open(url,'_blank');
}

function getGcalUrl(text,dateStr){
    if(!dateStr) return null;
    const d=new Date(dateStr);
    const s=d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
    const e=new Date(d.getTime()+60*60*1000).toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
    return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(text)}&dates=${s}/${e}`;
}

// ── 남은 시간 계산 ──
function getTimeLabel(dateStr){
    if(!dateStr) return null;
    const diff=new Date(dateStr)-new Date();
    const abs=Math.abs(diff);
    const mins=Math.floor(abs/60000);
    const hrs=Math.floor(mins/60);
    const days=Math.floor(hrs/24);
    if(diff<0){
        if(days>0) return {text:`${days}일 ${hrs%24}시간 지남`,type:'overdue'};
        if(hrs>0) return {text:`${hrs}시간 ${mins%60}분 지남`,type:'overdue'};
        return {text:`${mins}분 지남`,type:'overdue'};
    }
    if(days>0) return {text:`${days}일 ${hrs%24}시간 후`,type:'soon'};
    if(hrs>0) return {text:`${hrs}시간 ${mins%60}분 후`,type:hrs<3?'today':'soon'};
    return {text:`${mins}분 후`,type:'today'};
}

// ── 긴급 대시보드 렌더링 ──
function renderUrgentDashboard(){
    const container=document.getElementById('urgent-dashboard');
    const now=new Date();
    const urgent=todos.filter(t=>{
        if(t.done||!t.date) return false;
        const d=new Date(t.date);
        const diffHrs=(d-now)/3600000;
        return diffHrs<24;
    }).sort((a,b)=>new Date(a.date)-new Date(b.date));

    if(urgent.length===0){ container.innerHTML=''; return; }

    let html=`<div class="dash-title">⚡ 긴급 · 오늘 마감</div>`;
    urgent.forEach(t=>{
        const tl=getTimeLabel(t.date);
        const type=tl?tl.type:'today';
        const label=type==='overdue'?'기한 초과':type==='today'?'오늘 마감':'곧 마감';
        html+=`<div class="urgent-card ${type}">
            <div class="uc-label">${label}</div>
            <div class="uc-text">${t.text}</div>
            <div class="uc-countdown">
                <span>${tl?tl.text:''}</span>
                ${t.date?`<a href="${getGcalUrl(t.text,t.date)}" target="_blank" style="font-size:11px;color:#1971c2;text-decoration:none;background:#e8f4fd;padding:2px 7px;border-radius:6px;margin-left:4px;">캘린더</a>`:''}
            </div>
            <button class="uc-done-btn" onclick="toggleTodo('${t.fid}',false)" title="완료">✓</button>
        </div>`;
    });
    container.innerHTML=html;
}

// ── 할 일 추가 ──
async function addTodo(){
    const input=document.getElementById('t-input'),date=document.getElementById('t-date');
    if(!input.value.trim()) return;
    await userCol('todos').add({
        text:input.value.trim(), date:date.value,
        priority:document.getElementById('t-priority').value,
        done:false, notified:false,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    input.value=''; date.value='';
    document.getElementById('gcal-preview-btn').classList.add('hidden');
}
async function toggleTodo(fid,cur){ await userCol('todos').doc(fid).update({done:!cur}); }
async function saveEdit(fid){
    const newText=document.getElementById('edit-text-'+fid).value.trim();
    if(!newText){alert('내용을 입력해주세요.');return;}
    await userCol('todos').doc(fid).update({
        text:newText,
        priority:document.getElementById('edit-priority-'+fid).value,
        date:document.getElementById('edit-date-'+fid).value,
        notified:false
    });
}
async function delTodo(fid){ if(!confirm('삭제할까요?'))return; await userCol('todos').doc(fid).delete(); }

function openEdit(fid){
    document.querySelectorAll('.edit-area.open').forEach(el=>el.classList.remove('open'));
    const t=todos.find(x=>x.fid===fid); if(!t)return;
    document.getElementById('edit-text-'+fid).value=t.text;
    document.getElementById('edit-priority-'+fid).value=t.priority;
    document.getElementById('edit-date-'+fid).value=t.date||'';
    document.getElementById('edit-'+fid).classList.add('open');
}
function cancelEdit(fid){ document.getElementById('edit-'+fid)?.classList.remove('open'); }

// ── 할 일 렌더링 ──
function renderTodos(){
    const container=document.getElementById('todo-list');
    document.getElementById('s-total').innerText=todos.length;
    document.getElementById('s-done').innerText=todos.filter(x=>x.done).length;
    document.getElementById('s-left').innerText=todos.filter(x=>!x.done).length;

    const active=todos.filter(t=>!t.done);
    const done=todos.filter(t=>t.done);

    updateBadge(active.length);

    if(todos.length===0){ container.innerHTML='<div class="empty">할 일이 없습니다 🎉</div>'; return; }

    let html='';

    if(active.length>0){
        html+=`<div class="todo-section"><div class="todo-section-header">진행중 ${active.length}건</div>`;
        html+=active.map(t=>renderTodoItem(t)).join('');
        html+='</div>';
    }
    if(done.length>0){
        html+=`<div class="todo-section" style="opacity:0.65;"><div class="todo-section-header">완료 ${done.length}건</div>`;
        html+=done.map(t=>renderTodoItem(t)).join('');
        html+='</div>';
    }
    container.innerHTML=html;
}

function renderTodoItem(t){
    const tl=t.date&&!t.done?getTimeLabel(t.date):null;
    const gcal=getGcalUrl(t.text,t.date);
    const pClass=t.priority==='높음'?'high':t.priority==='낮음'?'low':'';
    return `<div class="item ${t.done?'done':''}">
        <div style="padding-top:2px;"><input type="checkbox" style="width:20px;height:20px;cursor:pointer;accent-color:var(--primary);" ${t.done?'checked':''} onchange="toggleTodo('${t.fid}',${t.done})"></div>
        <div class="item-content">
            <div class="item-text">${t.text}</div>
            <div class="item-meta">
                <span class="badge ${pClass}">${t.priority}</span>
                ${tl?`<span class="time-badge">${tl.text}</span>`:(t.date?`<span class="time-badge">${t.date.replace('T',' ')}</span>`:'')}
                ${gcal&&!t.done?`<a href="${gcal}" target="_blank" style="font-size:11px;color:#1971c2;text-decoration:none;background:#e8f4fd;padding:2px 7px;border-radius:6px;">🗓 캘린더</a>`:''}
            </div>
            <div class="edit-area" id="edit-${t.fid}">
                <div style="display:flex;gap:8px;margin-bottom:8px;">
                    <input id="edit-text-${t.fid}" class="flex-1" placeholder="할 일 내용">
                    <select id="edit-priority-${t.fid}" style="width:76px;"><option>보통</option><option>높음</option><option>낮음</option></select>
                </div>
                <input id="edit-date-${t.fid}" type="datetime-local" style="margin-bottom:8px;">
                <div class="edit-row">
                    <button class="btn-save" onclick="saveEdit('${t.fid}')">저장</button>
                    <button class="btn-cancel" onclick="cancelEdit('${t.fid}')">취소</button>
                </div>
            </div>
        </div>
        <div class="item-actions">
            <button class="btn-icon" onclick="openEdit('${t.fid}')">✏️</button>
            <button class="btn-icon" onclick="delTodo('${t.fid}')">×</button>
        </div>
    </div>`;
}

// ── 배지 업데이트 ──
function updateBadge(count){
    if(!('setAppBadge' in navigator)) return;
    if(count>0) navigator.setAppBadge(count).catch(()=>{});
    else navigator.clearAppBadge().catch(()=>{});
}

// ── 메모 ──
async function addMemo(){
    const title=document.getElementById('m-title'),body=document.getElementById('m-body');
    if(!title.value&&!body.value) return;
    await userCol('memos').add({title:title.value,body:body.value,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    title.value='';body.value='';
}
async function delMemo(fid){ if(!confirm('삭제할까요?'))return; await userCol('memos').doc(fid).delete(); }
function renderMemos(){
    const container=document.getElementById('memo-list');
    if(memos.length===0){container.innerHTML='<div class="empty">메모가 없습니다.</div>';return;}
    container.innerHTML='<div class="memo-card">'+memos.map(m=>`
        <div class="memo-item" style="display:flex;gap:12px;align-items:flex-start;">
            <div style="flex:1;">
                <div style="font-weight:700;font-size:14px;margin-bottom:3px;">${m.title||'제목 없음'}</div>
                <div style="font-size:13px;color:#666;white-space:pre-wrap;">${m.body}</div>
            </div>
            <button class="btn-icon" onclick="delMemo('${m.fid}')">×</button>
        </div>`).join('')+'</div>';
}

// ── 탭 전환 ──
function switchTab(name,el){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('sec-'+name).classList.add('active');
}

// ── 앱 내 알림 (앱 열려있을 때) ──
const canvas=document.createElement('canvas');canvas.width=32;canvas.height=32;const ctx=canvas.getContext('2d');
function setFavicon(color){
    ctx.clearRect(0,0,32,32);
    if(color){ctx.fillStyle=color;ctx.fillRect(0,0,32,32);ctx.fillStyle='white';ctx.font='bold 24px Arial';ctx.textAlign='center';ctx.fillText('!',16,26);}
    let link=document.querySelector("link[rel~='icon']");
    if(!link){link=document.createElement('link');link.rel='icon';document.head.appendChild(link);}
    link.href=canvas.toDataURL();
}
function triggerAlert(text){
    if(Notification.permission==='granted'){
        const n=new Notification('⏰ 마감 시간입니다!',{body:text});
        n.onclick=()=>{window.focus();n.close();};
    }
    try{
        const a=new(window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();
        o.connect(g);g.connect(a.destination);o.frequency.setValueAtTime(523.25,a.currentTime);
        g.gain.setValueAtTime(0.1,a.currentTime);o.start();o.stop(a.currentTime+0.5);
    }catch(e){}
    if(!blinker){let tg=false;blinker=setInterval(()=>{document.title=tg?`🚨 [마감] ${text}`:`❗ [확인] ${text}`;setFavicon(tg?'#ff0000':'#ffff00');tg=!tg;},400);}
    document.getElementById('alert-msg').innerText=text;
    const ov=document.getElementById('alert-overlay');ov.style.display='flex';
    if(!sirenInterval){let r=false;sirenInterval=setInterval(()=>{ov.style.backgroundColor=r?'rgba(0,0,0,0.9)':'rgba(224,49,49,0.7)';r=!r;},400);}
}
function closeAlert(){
    document.getElementById('alert-overlay').style.display='none';
    clearInterval(blinker);clearInterval(sirenInterval);blinker=null;sirenInterval=null;
    document.title='김비서';setFavicon(null);
}
setInterval(()=>{
    if(!currentUser)return;
    const now=new Date();
    const ns=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+'T'+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    todos.forEach(async t=>{
        if(!t.done&&t.date===ns&&!t.notified){
            triggerAlert(t.text);
            await userCol('todos').doc(t.fid).update({notified:true});
        }
    });
},10000);
</script>
