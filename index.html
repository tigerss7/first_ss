<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#212529">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="김비서">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-152.png">
    <title>김비서</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root{--primary:#212529;--danger:#e03131;--bg-soft:#f8f9fa;--border:#dee2e6;--radius:12px;--font:'Pretendard',-apple-system,sans-serif;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);}
        *{box-sizing:border-box;margin:0;padding:0;font-family:var(--font);-webkit-tap-highlight-color:transparent;}
        body{background:#fff;color:#333;line-height:1.6;padding-top:calc(var(--safe-top) + 16px);padding-bottom:calc(var(--safe-bottom) + 16px);padding-left:16px;padding-right:16px;}
        .app{max-width:600px;margin:0 auto;}
        
        #loading-screen{display:flex;align-items:center;justify-content:center;min-height:80vh;flex-direction:column;gap:14px;}
        .spinner{width:36px;height:36px;border:3px solid #eee;border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}

        #login-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:20px;}
        .btn-google{display:flex;align-items:center;gap:12px;background:white;border:1px solid #ddd;padding:14px 24px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,0.08);margin-bottom:12px;}
        .btn-google img{width:22px;height:22px;}
        
        .ios-install-guide {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1a5fa8; color: white; padding: 18px 24px;
            border-radius: 20px; z-index: 10001; width: 90%; max-width: 350px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-size: 14px; line-height: 1.6; animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { bottom: -100px; opacity: 0; } to { bottom: 30px; opacity: 1; } }

        #main-app{display:none;}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
        .header-left{display:flex;align-items:center;gap:8px;}
        .user-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1px solid #eee;}
        .user-name{font-size:11px;color:#888;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .btn-logout{background:none;border:1px solid #ddd;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;color:#666;}
        .tabs{display:flex;gap:5px;background:var(--bg-soft);padding:5px;border-radius:10px;}
        .tab{padding:8px 18px;border:none;border-radius:7px;cursor:pointer;background:transparent;font-size:13px;transition:0.2s;}
        .tab.active{background:white;font-weight:bold;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
        .stat-card{background:var(--bg-soft);padding:12px;border-radius:var(--radius);text-align:center;}
        .stat-num{font-size:20px;font-weight:bold;color:var(--primary);}
        .stat-label{font-size:11px;color:#666;margin-top:2px;}
        .input-card{background:var(--bg-soft);padding:18px;border-radius:var(--radius);margin-bottom:20px;border:1px solid var(--border);}
        input,select,textarea{padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;width:100%;background:white;color:#333;}
        .btn-add{background:var(--primary);color:white;border:none;padding:14px;border-radius:8px;cursor:pointer;width:100%;font-weight:bold;font-size:15px;}
        .item{display:flex;gap:12px;padding:15px;border-bottom:1px solid #eee;align-items:flex-start;}
        .item.urgent{background:#fff5f5;border-left:4px solid var(--danger);}
        .item-text{font-size:14px;font-weight:600;margin-bottom:4px;word-break:break-all;}
        .btn-del{color:#ccc;border:none;background:none;cursor:pointer;font-size:20px;}
        #alert-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:10000;align-items:center;justify-content:center;}
        .modal{background:white;padding:35px;border-radius:24px;text-align:center;width:85%;max-width:380px;}
        .section{display:none;}
        .section.active{display:block;}
    </style>
</head>
<body>

<div id="alert-overlay"><div class="modal"><h2>🚨 마감 알림 🚨</h2><p id="alert-msg" style="font-weight:bold;margin-bottom:20px;"></p><button class="btn-confirm" onclick="closeAlert()">확인했습니다</button></div></div>

<div id="loading-screen">
    <div class="spinner"></div>
    <div style="font-size:13px;color:#aaa;margin-top:10px;">데이터 연결 중...</div>
</div>

<div id="login-screen">
    <div class="login-icon" style="font-size:40px;margin-bottom:10px;">📋</div>
    <div class="login-title" style="font-size:24px;font-weight:bold;margin-bottom:5px;">나의 완벽한 비서</div>
    <div class="login-sub" style="font-size:14px;color:#888;margin-bottom:25px;">모든 기기에서 데이터를 동기화합니다</div>
    <button class="btn-google" onclick="loginWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Google로 로그인
    </button>
</div>

<div id="main-app">
    <div class="app">
        <div class="header">
            <div class="header-left">
                <img id="user-avatar" class="user-avatar" src="" alt="">
                <div><div style="font-size:14px;font-weight:bold;">김비서</div><div id="user-name" class="user-name"></div></div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('todo',this)">할 일</button>
                    <button class="tab" onclick="switchTab('memo',this)">메모</button>
                </div>
                <button class="btn-logout" onclick="logout()">로그아웃</button>
            </div>
        </div>

        <div id="sec-todo" class="section active">
            <div class="stats">
                <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-label">전체</div></div>
                <div class="stat-card"><div class="stat-num" id="s-done">0</div><div class="stat-label">완료</div></div>
                <div class="stat-card"><div class="stat-num" id="s-left">0</div><div class="stat-label">진행중</div></div>
            </div>
            <div class="input-card">
                <input id="t-input" style="margin-bottom:8px;" placeholder="할 일을 입력하세요...">
                <div style="display:flex; gap:8px; margin-bottom:8px;">
                    <input id="t-date" type="datetime-local" class="flex-1">
                    <select id="t-priority" style="width:85px;"><option>보통</option><option>높음</option><option>낮음</option></select>
                </div>
                <button class="btn-add" onclick="addTodo()">추가하기</button>
            </div>
            <div id="todo-list"></div>
        </div>

        <div id="sec-memo" class="section">
            <div class="input-card">
                <input id="m-title" style="margin-bottom:8px;" placeholder="제목">
                <textarea id="m-body" rows="5" placeholder="내용을 입력하세요..."></textarea>
                <button class="btn-add" style="margin-top:8px;" onclick="addMemo()">저장</button>
            </div>
            <div id="memo-list"></div>
        </div>
    </div>
</div>

<script>
// 1. Firebase 초기 설정
const firebaseConfig={apiKey:"AIzaSyDIqijLagXNJborvELQ60Uop6mzUK2jB_Y",authDomain:"tirerss7.firebaseapp.com",projectId:"tirerss7",storageBucket:"tirerss7.firebasestorage.app",messagingSenderId:"1093160433471",appId:"1:1093160433471:web:d77341ee31f77442ee058a"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone === true;

// 2. 서비스 워커 등록
window.addEventListener('load', () => {
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
});

// 3. 아이폰 설치 가이드
if (isIOS && !isStandalone) {
    const guide = document.createElement('div');
    guide.className = 'ios-install-guide';
    guide.innerHTML = `앱 사용을 위해 하단의 <b>공유 버튼(↑)</b>을 누르고<br><b>'홈 화면에 추가'</b>를 선택해주세요! 📲`;
    document.body.appendChild(guide);
    setTimeout(() => guide.remove(), 10000);
}

// 4. 로딩 꼬임 방지 강제 새로고침
if (!isStandalone && !sessionStorage.getItem('reloaded')) {
    sessionStorage.setItem('reloaded', 'true');
    window.location.reload();
}

// 5. 로그인 상태 유지 및 인증 상태 감지 (핵심 수정!)
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
    .then(() => {
        return auth.onAuthStateChanged(user => {
            document.getElementById('loading-screen').style.display='none';
            if(user){
                currentUser=user;
                document.getElementById('user-avatar').src=user.photoURL || '';
                document.getElementById('user-name').textContent=user.displayName || user.email;
                document.getElementById('login-screen').style.display='none';
                document.getElementById('main-app').style.display='block';
                startListeners();
            } else {
                currentUser=null;
                document.getElementById('main-app').style.display='none';
                document.getElementById('login-screen').style.display='flex';
                stopListeners();
            }
        });
    })
    .catch(error => console.error("인증 설정 오류:", error));

function loginWithGoogle(){
    const provider = new firebase.auth.GoogleAuthProvider();
    // 아이폰 브라우저에서는 Redirect, 설치된 앱이나 안드로이드에서는 Popup 사용
    if(isIOS && !isStandalone) {
        auth.signInWithRedirect(provider);
    } else {
        auth.signInWithPopup(provider);
    }
}

function logout(){ if(confirm('로그아웃 하시겠습니까?')) auth.signOut(); }

// 6. 데이터 리스너 및 렌더링
let todos=[], memos=[], unsubTodos=null, unsubMemos=null, currentUser=null;

function startListeners(){
    const uid = currentUser.uid;
    unsubTodos = db.collection('users').doc(uid).collection('todos').orderBy('createdAt','desc').onSnapshot(snap => {
        todos = snap.docs.map(d => ({fid:d.id, ...d.data()}));
        renderTodos();
    });
    unsubMemos = db.collection('users').doc(uid).collection('memos').orderBy('createdAt','desc').onSnapshot(snap => {
        memos = snap.docs.map(d => ({fid:d.id, ...d.data()}));
        renderMemos();
    });
}

function stopListeners(){ if(unsubTodos) unsubTodos(); if(unsubMemos) unsubMemos(); }

async function addTodo(){
    const input=document.getElementById('t-input'), date=document.getElementById('t-date');
    if(!input.value.trim()) return;
    await db.collection('users').doc(currentUser.uid).collection('todos').add({
        text: input.value.trim(), date: date.value, priority: document.getElementById('t-priority').value,
        done: false, notified: false, createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    input.value=''; date.value='';
}

async function toggleTodo(fid, cur){ await db.collection('users').doc(currentUser.uid).collection('todos').doc(fid).update({done: !cur}); }
async function delTodo(fid){ if(confirm('삭제하시겠습니까?')) await db.collection('users').doc(currentUser.uid).collection('todos').doc(fid).delete(); }

function renderTodos(){
    const container=document.getElementById('todo-list');
    document.getElementById('s-total').innerText=todos.length;
    document.getElementById('s-done').innerText=todos.filter(x=>x.done).length;
    document.getElementById('s-left').innerText=todos.filter(x=>!x.done).length;
    if(todos.length===0){container.innerHTML='<div style="text-align:center;padding:40px;color:#ccc;">목록이 비었습니다.</div>';return;}
    container.innerHTML = todos.map(t => `
        <div class="item ${t.done?'done':''} ${(!t.done && t.date && new Date(t.date.replace('T',' ')) < new Date())?'urgent':''}">
            <input type="checkbox" style="width:20px;height:20px;margin-top:4px;" ${t.done?'checked':''} onchange="toggleTodo('${t.fid}',${t.done})">
            <div style="flex:1; min-width:0;">
                <div class="item-text" style="${t.done?'text-decoration:line-through;color:#aaa;':''}">${t.text}</div>
                <div style="font-size:11px;color:#999;">${t.priority} | ${t.date?t.date.replace('T',' '):'기한없음'}</div>
            </div>
            <button class="btn-del" onclick="delTodo('${t.fid}')">×</button>
        </div>`).join('');
}

async function addMemo(){
    const title=document.getElementById('m-title'), body=document.getElementById('m-body');
    if(!title.value && !body.value) return;
    await db.collection('users').doc(currentUser.uid).collection('memos').add({
        title: title.value, body: body.value, createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    title.value=''; body.value='';
}

function renderMemos(){
    const container=document.getElementById('memo-list');
    if(memos.length===0){container.innerHTML='<div style="text-align:center;padding:40px;color:#ccc;">메모가 없습니다.</div>';return;}
    container.innerHTML = memos.map(m => `<div class="item"><div style="flex:1;"><b>${m.title||'제목없음'}</b><div style="font-size:13px;color:#666;white-space:pre-wrap;">${m.body}</div></div><button class="btn-del" onclick="delMemo('${m.fid}')">×</button></div>`).join('');
}
async function delMemo(fid){ if(confirm('삭제하시겠습니까?')) await db.collection('users').doc(currentUser.uid).collection('memos').doc(fid).delete(); }

function triggerAlert(text){
    document.getElementById('alert-msg').innerText=text;
    document.getElementById('alert-overlay').style.display='flex';
}
function closeAlert(){ document.getElementById('alert-overlay').style.display='none'; }

function switchTab(name, el){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    el.classList.add('active'); document.getElementById('sec-'+name).classList.add('active');
}

setInterval(() => {
    if(!currentUser) return;
    const now = new Date();
    const ns = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+'T'+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    todos.forEach(t => { if(!t.done && t.date === ns && !t.notified) { triggerAlert(t.text); db.collection('users').doc(currentUser.uid).collection('todos').doc(t.fid).update({notified:true}); } });
}, 10000);
</script>
</body>
</html>
